appId: com.flatcove.app.v2
---
# Reusable sub-flow: authenticates via deep link using E2E API session token.
# Requires E2E_API_URL env var passed via `maestro test -e E2E_API_URL=...`
- runScript:
    file: ../../scripts/create-session.js
    env:
      E2E_API_URL: ${E2E_API_URL}
      VERCEL_BYPASS_SECRET: ${VERCEL_BYPASS_SECRET}
- openLink: flatsby://e2e-login?token=${output.SESSION.token}&apiUrl=${output.SESSION.apiUrl}&cookieName=${output.SESSION.cookieName}
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
