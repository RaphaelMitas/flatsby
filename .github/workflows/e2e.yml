name: E2E Tests

on:
  deployment_status:

concurrency:
  group: e2e-${{ github.event.deployment.sha }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  check-pr:
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    outputs:
      has-pr: ${{ steps.check.outputs.has-pr }}
    steps:
      - name: Check for associated PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_COUNT=$(gh pr list --repo "${{ github.repository }}" --search "${{ github.event.deployment.sha }}" --state open --json number --jq 'length')
          echo "has-pr=$([[ "$PR_COUNT" -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  e2e-web:
    needs: check-pr
    if: needs.check-pr.outputs.has-pr == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: ./tooling/github/setup

      - name: Install Playwright Chromium
        run: pnpm --filter @flatsby/nextjs exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm turbo run test:e2e --filter=@flatsby/nextjs
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/nextjs/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: apps/nextjs/test-results/
          retention-days: 7

  e2e-ios:
    needs: check-pr
    # TODO(RAP-39): Re-enable when Mac Mini runner is back online after upgrade.
    # Cloud runner migration deferred — see RAP-39 for Option A details.
    if: false
    runs-on: [self-hosted, macos, arm64]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: ./tooling/github/setup
        with:
          cache: "false"

      - name: Clean native build artifacts
        working-directory: apps/expo
        run: rm -rf ios android build-cache

      - name: Update CocoaPods repo
        run: pod repo update

      - name: Build app for simulator
        working-directory: apps/expo
        run: |
          mkdir -p build-cache
          pnpm dlx eas-cli build --local --profile e2e --platform ios --output build-cache/Flatsby.tar.gz
          cd build-cache && tar -xzf Flatsby.tar.gz && rm Flatsby.tar.gz
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "Flatsby-E2E" || true
          xcrun simctl bootstatus "Flatsby-E2E"

      - name: Install app on simulator
        run: xcrun simctl install "Flatsby-E2E" apps/expo/build-cache/Flatsby.app

      - name: Run Maestro tests
        working-directory: apps/expo
        run: |
          export PATH="$HOME/.maestro/bin:$PATH"
          mkdir -p e2e/results
          maestro test -e E2E_API_URL="$E2E_API_URL" -e VERCEL_BYPASS_SECRET="$VERCEL_BYPASS_SECRET" e2e/flows/ --format junit --output e2e/results/report.xml
        env:
          E2E_API_URL: ${{ github.event.deployment_status.target_url }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-results
          path: apps/expo/e2e/results/
          retention-days: 7

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "Flatsby-E2E" || true
