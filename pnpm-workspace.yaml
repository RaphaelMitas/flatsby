packages:
  - apps/*
  - packages/*
  - tooling/*

# Transitive dependency vulnerabilities pinned by parent packages are forced to
# patched versions via overrides below. Remove overrides as upstream releases fixes.
# GHSA ignores remain for advisories that still match after overrides.
auditConfig:
  ignoreGhsas:
    - GHSA-67mh-4wv8-2f99
    - GHSA-w5hq-g745-h8pq
    - GHSA-qx2v-qp2m-jg93

catalog:
  "@ai-sdk/react": ^3.0.176
  "@eslint/js": ^10.0.1
  "@t3-oss/env-nextjs": ^0.13.11
  "@tailwindcss/postcss": ^4.2.4
  "@tanstack/react-query": ^5.100.8
  "@trpc/client": ^11.17.0
  "@trpc/server": ^11.17.0
  "@trpc/tanstack-react-query": ^11.17.0
  "@turbo/gen": ^2.9.8
  "@types/node": ^24.12.2
  ai: ^6.0.174
  autumn-js: ^1.2.17
  babel-plugin-react-compiler: ^1.0.0
  eslint: ^10.5.0
  next: ^16.2.6
  prettier: ^3.8.3
  superjson: ^2.2.6
  tailwindcss: ^4.2.4
  turbo: ^2.9.16
  typescript: ^6.0.3
  zod: ^4.4.2

catalogs:
  better-auth:
    "@better-auth/expo": 1.6.12
    better-auth: 1.6.12
  react19:
    "@types/react": ~19.2.0
    "@types/react-dom": ~19.2.0
    react: 19.2.0
    react-dom: 19.2.0
ignoredBuiltDependencies:
  - unrs-resolver

linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@tailwindcss/oxide"
  - esbuild
  - protobufjs
  - sharp

overrides:
  # Better Auth 1.6.12's SQLite dialect bundle imports Kysely migration
  # constants removed in 0.29.x during Next/Turbopack builds.
  '@babel/core@<=7.29.0': '>=7.29.6'
  dompurify@<3.4.9: '>=3.4.9'
  esbuild@<0.28.1: '>=0.28.1'
  js-yaml@<=4.1.1: '>=4.2.0'
  kysely: 0.28.17
  # NativeWind v5 / Lightning CSS deserialization regression workaround.
  lightningcss: 1.30.1
  postcss@<8.5.10: '>=8.5.10'
  protobufjs@<=7.6.2: '>=7.6.3'
  shell-quote@>=1.1.0 <=1.8.3: '>=1.8.4'
  uuid@<11.1.1: '>=11.1.1'
  uuid@>=13.0.0 <13.0.1: '>=13.0.1'
  ws@>=7.0.0 <7.5.11: '>=7.5.11'

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
