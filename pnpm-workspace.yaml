packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  "@ai-sdk/react": ^3.0.139
  autumn-js: ^1.1.2
  "@eslint/js": ^10.0.1
  "@t3-oss/env-nextjs": ^0.13.11
  "@tailwindcss/postcss": ^4.2.2
  "@tanstack/react-query": ^5.95.2
  "@trpc/client": ^11.15.1
  "@trpc/server": ^11.15.1
  "@trpc/tanstack-react-query": ^11.15.1
  "@turbo/gen": ^2.8.20
  "@types/node": ^24.12.0
  ai: ^6.0.137
  babel-plugin-react-compiler: ^1.0.0
  eslint: ^10.1.0
  next: ^16.2.1
  prettier: ^3.8.1
  superjson: ^2.2.6
  tailwindcss: ^4.2.2
  turbo: ^2.8.20
  typescript: ^6.0.0
  zod: ^4.3.6

catalogs:
  better-auth:
    "@better-auth/expo": 1.5.6
    better-auth: 1.5.6
  react19:
    "@types/react": ~19.1.0
    "@types/react-dom": ~19.1.0
    react: 19.1.5
    react-dom: 19.1.5

overrides:
  lightningcss: 1.30.1

linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@tailwindcss/oxide"
  - esbuild

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss

# Unfixable transitive dep vulnerabilities (pinned by parent packages).
# Remove entries as upstream packages release fixes.
# - esbuild: @esbuild-kit/core-utils@3.3.2 pins ~0.18.20 (drizzle-kit)
# - brace-expansion: expo SDK 54 pins minimatch@9/3 → brace-expansion@2/1 (no patch for <v5)
auditConfig:
  ignoreGhsas:
    - GHSA-67mh-4wv8-2f99
    - GHSA-f886-m6hf-6m8v
