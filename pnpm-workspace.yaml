packages:
  - apps/*
  - packages/*
  - tooling/*

# Unfixable transitive dependency vulnerabilities (pinned by parent packages).
# Remove entries as upstream packages release fixes.
# - esbuild: @esbuild-kit/core-utils@3.3.2 pins ~0.18.20 (drizzle-kit)
# - uuid: Expo/LangChain/PostHog dependency chain has no uuid >=14 path yet.
# - postcss: Next and Expo Metro still pin vulnerable 8.4.x releases.
auditConfig:
  ignoreGhsas:
    - GHSA-67mh-4wv8-2f99
    - GHSA-w5hq-g745-h8pq
    - GHSA-qx2v-qp2m-jg93

catalog:
  "@ai-sdk/react": ^3.0.211
  "@eslint/js": ^10.0.1
  "@t3-oss/env-nextjs": ^0.13.11
  "@tailwindcss/postcss": ^4.3.1
  "@tanstack/react-query": ^5.101.1
  "@trpc/client": ^11.18.0
  "@trpc/server": ^11.18.0
  "@trpc/tanstack-react-query": ^11.18.0
  "@turbo/gen": ^2.10.0
  "@types/node": ^24.13.2
  ai: ^6.0.209
  autumn-js: ^1.2.31
  babel-plugin-react-compiler: ^1.0.0
  eslint: ^10.5.0
  next: ^16.2.9
  prettier: ^3.8.4
  superjson: ^2.2.6
  tailwindcss: ^4.3.1
  turbo: ^2.10.0
  typescript: ^6.0.3
  zod: ^4.4.3

catalogs:
  better-auth:
    "@better-auth/expo": 1.6.20
    better-auth: 1.6.20
  react19:
    "@types/react": ~19.2.0
    "@types/react-dom": ~19.2.0
    react: 19.2.0
    react-dom: 19.2.0
ignoredBuiltDependencies:
  - unrs-resolver

linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@tailwindcss/oxide"
  - esbuild
  - protobufjs
  - sharp

overrides:
  # Better Auth 1.6.12's SQLite dialect bundle imports Kysely migration
  # constants removed in 0.29.x during Next/Turbopack builds.
  kysely: 0.29.2
  # NativeWind v5 / Lightning CSS deserialization regression workaround.
  lightningcss: 1.30.1
  # @istanbuljs/load-nyc-config (via react-native > babel-jest) pins js-yaml 3.x.
  js-yaml: 4.2.0

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
