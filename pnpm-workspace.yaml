packages:
  - apps/*
  - packages/*
  - tooling/*

# Unfixable transitive dep vulnerabilities (pinned by parent packages).
# Remove entries as upstream packages release fixes.
# - esbuild: @esbuild-kit/core-utils@3.3.2 pins ~0.18.20 (drizzle-kit)
auditConfig:
  ignoreGhsas:
    - GHSA-67mh-4wv8-2f99

catalog:
  "@ai-sdk/react": ^3.0.170
  "@eslint/js": ^10.0.1
  "@t3-oss/env-nextjs": ^0.13.11
  "@tailwindcss/postcss": ^4.2.2
  "@tanstack/react-query": ^5.99.0
  "@trpc/client": ^11.16.0
  "@trpc/server": ^11.16.0
  "@trpc/tanstack-react-query": ^11.16.0
  "@turbo/gen": ^2.9.6
  "@types/node": ^24.12.2
  ai: ^6.0.168
  autumn-js: ^1.2.9
  babel-plugin-react-compiler: ^1.0.0
  eslint: ^10.2.0
  next: ^16.2.4
  prettier: ^3.8.3
  superjson: ^2.2.6
  tailwindcss: ^4.2.2
  turbo: ^2.9.6
  typescript: ^6.0.3
  zod: ^4.3.6

catalogs:
  better-auth:
    "@better-auth/expo": 1.6.5
    better-auth: 1.6.5
  react19:
    "@types/react": ~19.2.0
    "@types/react-dom": ~19.2.0
    react: 19.2.0
    react-dom: 19.2.0
ignoredBuiltDependencies:
  - unrs-resolver

linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@tailwindcss/oxide"
  - esbuild
  - protobufjs
  - sharp

overrides:
  # NativeWind v5 / Lightning CSS deserialization regression workaround.
  lightningcss: 1.30.1

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
